<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

    <h1>Meal Planner</h1>

    <!-- ADD MEAL -->
    <div class="card">
        <h2>Add Meal</h2>

        <form method="POST" action="/add_meal">
            <input name="name" placeholder="Meal name" required>

            <div id="ingredients">
                <div class="row">
                    <input name="ingredient_name[]" placeholder="Ingredient">
                    <input name="ingredient_qty[]" placeholder="Qty" type="number">
                </div>
            </div>

            <button type="button" onclick="addIngredient()">+ Add ingredient</button>
            <button type="submit">Save meal</button>
        </form>
    </div>

    <!-- PLANNER -->
    <div class="card">
        <h2>Week Planner</h2>

        <div class="week">
            {% for day in ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] %}
            <div class="day">
                <label>{{ day }}</label>

                <select class="meal">
                    <option value="">--</option>
                    {% for meal in meals.keys() %}
                    <option value="{{ meal }}">{{ meal }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endfor %}
        </div>

        <button onclick="generate()">Generate Shopping List</button>
    </div>

    <!-- OUTPUT -->
    <div class="card hidden" id="outputCard">
        <h2>Shopping List</h2>
        <pre id="output"></pre>

        <button onclick="share()">Share</button>
    </div>

</div>

<script>
    const MEALS = {{ meals | tojson }};
</script>

<script src="/static/script.js"></script>

</body>
</html>
