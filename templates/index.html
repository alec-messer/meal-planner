<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>

    <link rel="stylesheet" href="/static/style.css">
    <link rel="apple-touch-icon" href="/static/icon.png">
</head>

<body>

{% if success %}
<div class="success-banner" id="successBanner">
    Meal added successfully
</div>
{% endif %}

{% if deleted %}
<div class="delete-banner" id="deleteBanner">
    Meal deleted successfully
</div>
{% endif %}

<!-- =========================
     SIDE PANEL (LEFT)
========================= -->
<div id="sidePanel" class="side-panel">

    <div class="panel-content">

        <h2>Add Meal</h2>

        <form method="POST" action="/add_meal" id="mealForm">

            <input name="name" id="mealName" placeholder="Meal name" required>

            <div id="ingredients-container">
                <div class="ingredient-row">
                    <input name="ingredient_name[]" placeholder="Ingredient" required>

                    <input name="ingredient_qty[]" placeholder="Qty" type="number" step="any" required>

                    <select name="ingredient_unit[]" required>
                        <option value="">Unit</option>
                        <option value="grams">grams</option>
                        <option value="items">items</option>
                    </select>

                    <select name="ingredient_type[]" required>
                        <option value="">Type</option>
                        <option value="meat">meat</option>
                        <option value="dairy">dairy</option>
                        <option value="fruit">fruit</option>
                        <option value="veg">veg</option>
                        <option value="other">other</option>
                    </select>
                </div>
            </div>

            <button type="button" onclick="addIngredient()">+ Add ingredient</button>
            <button type="submit" id="submitMeal" disabled>Add meal</button>

        </form>
    </div>
</div>

<!-- =========================
     SIDE PANEL (RIGHT)
========================= -->
<div id="deletePanel" class="side-panel right-panel">

    <div class="panel-content">

        <h2>Delete Meal</h2>

        <form method="POST" action="/delete_meal">

            <select name="name" required>
                <option value="">Select meal</option>
                {% for meal in meals.keys() %}
                <option value="{{ meal }}">{{ meal }}</option>
                {% endfor %}
            </select>

            <button type="submit" class="delete-btn">Delete meal</button>

        </form>

    </div>
</div>

<!-- =========================
     PANEL TOGGLE BUTTONS (FIXED OUTSIDE PANELS)
========================= -->

<button class="panel-handle" onclick="togglePanel()">+</button>
<button class="right-handle" onclick="toggleDeletePanel()">−</button>

<!-- =========================
     MAIN APP
========================= -->

<div class="app">

    <h1>Meal Planner</h1>

    <div class="card">
        <div class="week-vertical">
            {% for day in ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] %}
            <div class="day">
                <label>{{ day }}</label>

                <select class="meal-select">
                    <option value="">--</option>
                    {% for meal in meals.keys() %}
                    <option value="{{ meal }}">{{ meal }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endfor %}
        </div>

        <button onclick="generateList()">Generate Shopping List</button>
    </div>

    <div class="card hidden" id="output-card">
        <pre id="output"></pre>
        <button class="share-button" onclick="shareList()">Share</button>
    </div>

</div>

<script>
    const MEALS = {{ meals | tojson }};
</script>

<script src="/static/script.js"></script>

</body>
</html>
